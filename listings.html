<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
  <title>Home - KejaniFinds</title>
</head>

<body>
  <nav class="navbar">
    <div class="navbar-container">
      <div class="logo-container">
        <img src="images/kejani-logo.png" alt="KejaniFinds Logo" class="logo">
      </div>
    <div class="nav-logins">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="listings.html">Listings</a></li>
        <li><a href="saved-listings.html">My Saved</a></li>
      </ul>
      <a href="login.html" class="post-listing-button">Post a listing</a>
    </div>
  </nav>
  <section class = "available-listings">
    <h2>Available Finds</h2>
    <!-- listing grid -->
    <div class="finds-grid">
      <div class="find-card">
        <div class="find-img-container">
          <img src="images/house1.jpg" alt="Modern Apartment">
          <div class="card-stickers">
            <div class="sticker">&#10004; Verified</div>
            <div class="sticker">Inspected</div>
            </div>
        </div>
        <h3 class="rental-amount">Ksh 45,000<span>/month</span></h3>
        <p class="rental-capacity">Two Bedroom Apartment</p>
        <div class="rental-location"><div class="location-dot"></div>Westlands, Nairobi</p>
        <div class="rental-qualities">
          <p>2 bed</p>
          <p>1 bath</p>
        </div>
        <div class="agent-details">
          <img src="https://www.svgrepo.com/show/415616/basic-profile-ui.svg" alt="Image of Agent" class="agent-profile-img">
          <p id="agent-name">James Maina</p>
          <p id="agent-rating"></p><p class="review-count"></p>
        </div>
        <a href="#" class="view-button">View Details</a>
      </div>

    </div>
  </section>
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-logo">
        <img src="images/kejani-logo.png" alt="KejaniFinds Logo">
        <p>&copy; 2026 KejaniFinds. All rights reserved.</p>
      </div>
      <div class="footer-links">
        <h3>Quick Links</h3>
        <a href="index.html">Home</a>
        <a href="listings.html">Listings</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="footer-contact">
        <h3>Contact Us</h3>
        <img src="icons/email-icon.svg" alt="Email Icon" class="contact-icon" href="mailto:info@kejanifinds.com">
        <img src="icons/phone-icon.svg" alt="Phone Icon" class="contact-icon" href="tel:+254768943071">
        <img src="icons/whatsapp-icon.svg" alt="WhatsApp Icon" class="contact-icon" href="https://wa.me/+254768943071">
      </div>
    </div>
  </footer>
</body>
</html>
