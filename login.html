<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KejaniFinds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/login-styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-container">
      <div class="logo-container">
        <img src="images/kejani-logo.png" alt="KejaniFinds Logo" class="logo">
      </div>
      <div class="nav-logins">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="listings.html">Listings</a></li>
        </ul>
        <a href="#" id="postListingBtn" class="post-listing-button">Post a listing</a>
      </div>
    </div>
  </nav>

  <main class="login-container">
    <div class="login-card">

      <div id="view-loading" class="login-view">
        <div class="loading-spinner"></div>
        <p class="loading-text">Signing you in...</p>
      </div>

      <div id="view-error" class="login-view hidden">
        <div class="login-error-box" id="view-error-msg"></div>
        <button class="lc-btn-ghost" onclick="document.getElementById('view-error').classList.add('hidden'); document.getElementById('view-unauthenticated').classList.remove('hidden');">
          Try again
        </button>
      </div>

      <div id="view-authenticated" class="login-view hidden">
        <div class="lc-avatar" id="lc-avatar-initials">KF</div>
        <p class="lc-signed-in-label">Signed in as</p>
        <p class="lc-email" id="user-email"></p>
        <button id="btn-go-to-listing" class="lc-btn-primary">Continue to post a listing</button>
        <button id="btn-logout" class="lc-btn-ghost">Sign out</button>
      </div>

      <div id="view-unauthenticated" class="login-view hidden">

        <div class="lc-header">
          <div class="lc-logo-mark">K</div>
          <h1 class="lc-title">Sign in</h1>
          <p class="lc-subtitle">to continue to KejaniFinds</p>
        </div>

        <div class="lc-social-row">
          <button class="lc-social-btn" id="btn-google">
            <svg class="lc-social-icon" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>
          <button class="lc-social-btn" id="btn-apple">
            <svg class="lc-social-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            Continue with Apple
          </button>
        </div>

        <div class="lc-divider"><span>or</span></div>

        <div class="lc-form">
          <div class="lc-field">
            <label for="lc-email-input">Email</label>
            <input type="email" id="lc-email-input" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="lc-field">
            <label for="lc-password-input">Password</label>
            <input type="password" id="lc-password-input" placeholder="Your password" autocomplete="current-password" />
            <a href="#" class="lc-forgot" id="btn-forgot">Forgot password?</a>
          </div>
          <div id="lc-field-error" class="lc-field-error hidden"></div>
          <button class="lc-btn-primary" id="btn-login">Sign in</button>
        </div>

        <p class="lc-signup-prompt">
          Don't have an account?
          <a href="#" id="signup-link" class="lc-signup-link">Create one</a>
        </p>

      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-logo">
        <img src="images/kejani-logo.png" alt="KejaniFinds Logo">
        <p>&copy; 2026 KejaniFinds. All rights reserved.</p>
      </div>
      <div class="footer-links">
        <h3>Quick Links</h3>
        <a href="index.html">Home</a>
        <a href="listings.html">Listings</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="footer-contact">
        <h3>Contact Us</h3>
        <a href="mailto:info@kejanifinds.com"><img src="icons/email-icon.svg" alt="Email Icon" class="contact-icon"></a>
        <a href="tel:+254768943071"><img src="icons/phone-icon.svg" alt="Phone Icon" class="contact-icon"></a>
        <a href="https://wa.me/254768943071"><img src="icons/whatsapp-icon.svg" alt="WhatsApp Icon" class="contact-icon"></a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.18/auth0-spa-js.production.js"></script>
  <script src="auth.js"></script>

</body>
</html>
